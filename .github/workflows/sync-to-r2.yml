name: Validate + sync to R2

on:
  push:
    branches: [main]
    paths:
      - "templates/**"
      - "scripts/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/sync-to-r2.yml"
  pull_request:
    paths:
      - "templates/**"
      - "scripts/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

# Single concurrency group on the main publish so two pushes don't
# race each other into R2 with stale manifests. PRs run independently.
concurrency:
  group: sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # build-manifest derives the version from the commit count
          # on this branch — needs full history.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Resolve manifest version from git history
        id: ver
        run: |
          v=$(git rev-list --count HEAD)
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Validate templates + build manifest
        env:
          MANIFEST_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          go run ./scripts/build-manifest
          echo "---"
          jq '{version, templates: [.templates[] | {id, tier, version, definition_sha256}]}' manifest.json

      - name: Sanity — every template parses + sha256 matches
        run: |
          set -euo pipefail
          jq -r '.templates[] | "\(.definition_path) \(.definition_sha256)"' manifest.json |
          while read -r path want; do
            got=$(sha256sum "$path" | awk '{print $1}')
            if [ "$got" != "$want" ]; then
              echo "SHA mismatch for $path: manifest=$want, computed=$got"
              exit 1
            fi
          done

      # PR runs stop here — validation only. main pushes upload.
      - name: Skip upload on PRs
        if: github.event_name == 'pull_request'
        run: echo "PR build — manifest valid, not uploading."

      # ----- main publish below this point -----
      #
      # Auth model: a single Cloudflare API token with "Workers R2
      # Storage: Edit" permission, scoped to this repo's bucket. The
      # AK/SK pair the AWS-CLI / S3-compatible path needs was too
      # error-prone in practice — see the rename-to-g0s-prefix change
      # in workflow-ui's wrangler.jsonc for the operational backstory.
      # The Cloudflare API token format is the same one `wrangler r2
      # bucket create` used to make the bucket, so the auth path is
      # already proven for this repo.

      - name: Check Cloudflare secrets
        if: github.event_name != 'pull_request'
        id: cf_secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] \
              || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ] \
              || [ -z "${R2_BUCKET:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Cloudflare secrets not configured::Set CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, and R2_BUCKET under Settings -> Secrets and variables -> Actions. Validate + manifest build ran; upload skipped."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload templates + manifest to R2 (wrangler)
        if: github.event_name != 'pull_request' && steps.cf_secrets.outputs.configured == 'true'
        env:
          # wrangler picks these two env vars up automatically; no
          # `wrangler.toml` needed for one-off `r2 object` calls.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail

          # Pin to wrangler 4.x — same major as the local dev tooling.
          # `--remote` is critical: without it, wrangler writes to a
          # local emulation bucket and the publish silently no-ops.
          WRANGLER='npx -y wrangler@^4 r2 object put'
          echo "Using $(npx -y wrangler@^4 --version)"

          # Upload every template definition first so the manifest
          # never points at a missing object. R2 has no multi-object
          # atomicity; this ordering keeps a partial publish coherent
          # (manifest-not-yet-uploaded means the BFF reads the
          # previous manifest version + previous objects).
          for f in $(jq -r '.templates[].definition_path' manifest.json); do
            $WRANGLER "${R2_BUCKET}/${f}" \
              --file="$f" \
              --content-type=application/json \
              --remote
          done

          # Upload screenshots (when present) — same idea.
          for s in $(jq -r '.templates[] | select(.screenshot_path != null) | .screenshot_path' manifest.json); do
            if [ -f "$s" ]; then
              ext="${s##*.}"
              $WRANGLER "${R2_BUCKET}/${s}" \
                --file="$s" \
                --content-type="image/${ext}" \
                --remote
            fi
          done

          # Finally the manifest. The BFF's 60s in-memory cache will
          # pick this up automatically.
          $WRANGLER "${R2_BUCKET}/manifest.json" \
            --file=manifest.json \
            --content-type=application/json \
            --remote

          echo "Published manifest version $(jq -r .version manifest.json) — $(jq -r '.templates | length' manifest.json) templates"
