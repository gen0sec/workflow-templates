# Third layer of the user-vs-system separation. CODEOWNERS (with the
# branch ruleset's "require Code Owner review" rule) is the first +
# second layers; this guard catches the case where a community PR
# touches `templates/system/**` and fails the PR check status before
# a reviewer has to notice.
#
# Author permission is checked against the repo's collaborator set
# rather than gen0sec org membership. The repo-collaborator path
# works with the default GITHUB_TOKEN and matches the actually-relevant
# question ("can this person merge here?") regardless of whether org
# members have made their membership public — which most haven't, and
# the earlier org-membership check failed every maintainer PR as a
# result.
name: System paths guard

on:
  pull_request:
    paths:
      - 'templates/system/**'
      - '.github/CODEOWNERS'
      - '.github/workflows/system-paths-guard.yml'
      - 'scripts/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Verify author has write access to this repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "PR author: ${PR_AUTHOR}"
          # GitHub's collaborator-permission endpoint returns one of
          # admin / maintain / write / triage / read. Anything at write
          # or above gets to touch system paths; triage/read does not.
          # This works for org members (whether their membership is
          # public or not) and explicitly-added outside collaborators.
          perm=$(gh api "repos/${REPO}/collaborators/${PR_AUTHOR}/permission" \
                   --jq '.permission' 2>/dev/null || echo "none")
          echo "permission: ${perm}"
          case "${perm}" in
            admin|maintain|write)
              echo "::notice::${PR_AUTHOR} has ${perm} access — allowed."
              exit 0
              ;;
          esac
          echo "::error::This PR modifies a protected path (templates/system/, scripts/, or .github/) but the author (${PR_AUTHOR}) lacks write access to ${REPO}. Move your template to templates/custom/ instead, or ask a maintainer to take over the PR."
          exit 1
